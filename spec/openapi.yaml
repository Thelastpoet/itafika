openapi: 3.1.0
info:
  title: Itafika API
  version: "1.0.0-phase1"
  description: |
    A delivery orchestration API/control plane for ecommerce checkout in Kenya.

    Itafika gives any online shop a single interface to quote delivery options,
    create provider handoff state, and track delivery state across riders,
    matatu/bus SACCOs, and couriers, with Kenyan locations modelled
    as zones and stages rather than street addresses.

    This document is the **canonical Phase 1 contract**. The Cloudflare Worker
    reference implementation in `packages/` is generated against it. Any change
    to this file is governed by GOVERNANCE.md and accompanied by an ADR.
  license:
    name: MIT
    url: https://github.com/itafika/itafika/blob/main/LICENSE

servers:
  - url: http://localhost:8787
    description: Local Worker development server
  - url: https://api.itafika.dev
    description: Canonical hosted instance (placeholder)

tags:
  - name: Zones
    description: Locations such as CBD hubs, upcountry stages, and residential areas.
  - name: Dataset
    description: Metadata about the currently loaded open dataset.
  - name: Discovery
    description: |
      Browse delivery options for a destination area before committing to an exact
      route and weight (ADR 0017, checkout-delivery direction).
  - name: Quotes
    description: Delivery options and prices between two zones.
  - name: Deliveries
    description: Booking a chosen quote and tracking it.

paths:
  /v1/zones:
    get:
      tags: [Zones]
      summary: List supported drop-off / pick-up locations
      operationId: listZones
      parameters:
        - name: type
          in: query
          required: false
          description: Filter by zone type.
          schema:
            $ref: '#/components/schemas/ZoneType'
        - name: town
          in: query
          required: false
          description: Filter by town (ADR 0017).
          schema: { type: string }
        - name: county
          in: query
          required: false
          description: Filter by county (the checkout funnel's top level; ADR 0017).
          schema: { type: string }
        - name: limit
          in: query
          required: false
          schema: { type: integer, default: 100, minimum: 1, maximum: 500 }
      responses:
        '200':
          description: A list of zones.
          content:
            application/json:
              schema:
                type: object
                properties:
                  zones:
                    type: array
                    items: { $ref: '#/components/schemas/Zone' }
              example:
                zones:
                  - id: ZONE_NBI_CBD_01
                    name: RNG Plaza
                    type: cbd_hub
                    town: Nairobi
                    coordinates: { lat: -1.2841, lng: 36.8255 }
                  - id: ZONE_NKR_MAIN
                    name: Nakuru Main Stage
                    type: stage
                    town: Nakuru
                    coordinates: { lat: -0.3031, lng: 36.0800 }

  /v1/zones/search:
    get:
      tags: [Zones]
      summary: Search locations by name
      operationId: searchZones
      parameters:
        - name: q
          in: query
          required: true
          description: Free-text query, e.g. "cbd", "nyeri", "rng".
          schema: { type: string, minLength: 1 }
      responses:
        '200':
          description: Matching zones, best match first.
          content:
            application/json:
              schema:
                type: object
                properties:
                  zones:
                    type: array
                    items: { $ref: '#/components/schemas/Zone' }
              example:
                zones:
                  - id: ZONE_NBI_CBD_01
                    name: RNG Plaza
                    type: cbd_hub
                    town: Nairobi
        '400':
          $ref: '#/components/responses/BadRequest'

  /v1/freshness:
    get:
      tags: [Dataset]
      summary: List dataset freshness by town
      operationId: listFreshness
      responses:
        '200':
          description: The last-reviewed date for each town currently loaded in the dataset.
          content:
            application/json:
              schema:
                type: object
                properties:
                  freshness:
                    type: array
                    items: { $ref: '#/components/schemas/FreshnessEntry' }
              example:
                freshness:
                  - town: Nairobi
                    last_updated: "2026-06-08"
                  - town: Nakuru
                    last_updated: "2026-06-08"

  /v1/options:
    get:
      tags: [Discovery]
      summary: Browse delivery options into a destination area
      description: |
        Returns the navigable option tree for the shop's origin into the customer's
        town: which providers serve the route, in which mode, where they collect, and
        an indicative starting cost. This is **navigation, not pricing**: it takes no
        package weight and returns no bookable price. Once the customer picks a
        collection point (which becomes the `destination_zone_id`) and the weight is
        known, the shop calls `POST /v1/quotes` for the exact, bookable price.

        Specified by ADR 0017 (checkout-delivery direction).
      operationId: listOptions
      parameters:
        - name: origin_zone_id
          in: query
          required: true
          description: The shop's pickup zone.
          schema: { type: string }
        - name: destination_town
          in: query
          required: true
          description: The customer's town.
          schema: { type: string }
        - name: mode
          in: query
          required: false
          description: Filter to a single transport mode.
          schema: { $ref: '#/components/schemas/ProviderType' }
      responses:
        '200':
          description: Available delivery options into the town. May be an empty list.
          content:
            application/json:
              schema:
                type: object
                properties:
                  origin_zone_id: { type: string }
                  destination_town: { type: string }
                  options:
                    type: array
                    items: { $ref: '#/components/schemas/DeliveryOption' }
              example:
                origin_zone_id: ZONE_NBI_CBD_01
                destination_town: Nyeri
                options:
                  - provider_name: 2NK Sacco
                    provider_type: shuttle
                    reliability_score: 0.9
                    collection_type: office_pickup
                    from_cost_kes: 300
                    collection_points:
                      - zone_id: ZONE_NYR_STG_01
                        name: 2NK Nyeri Town Office
        '400':
          $ref: '#/components/responses/BadRequest'

  /v1/modes:
    get:
      tags: [Dataset]
      summary: List the transport-mode registry
      description: |
        Returns the transport modes a customer can choose between, each with display
        metadata. The registry is governed reference data (ADR 0019), not a hardcoded
        list, so a shop can render any mode, including ones added after it was built,
        without a code change.
      operationId: listModes
      responses:
        '200':
          description: The transport modes currently in the dataset.
          content:
            application/json:
              schema:
                type: object
                properties:
                  modes:
                    type: array
                    items: { $ref: '#/components/schemas/Mode' }
              example:
                modes:
                  - id: matatu_sacco
                    label: Matatu SACCO
                    description: Shared-taxi SACCO parcel desk service.
                  - id: shuttle
                    label: Shuttle
                    description: Scheduled long-distance shuttle SACCOs, e.g. 2NK, North Rift.

  /v1/quotes:
    post:
      tags: [Quotes]
      summary: Get delivery options and prices between two zones
      description: |
        The heart of Itafika. Given an origin, destination, weight, and package
        details, returns every available delivery option across all transport
        classes, each with an estimated cost, time, and (where asserted) a
        reliability score.
      operationId: createQuote
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/QuoteRequest' }
            example:
              origin_zone_id: ZONE_NBI_CBD_01
              destination_zone_id: ZONE_NKR_MAIN
              package_weight_kg: 2.5
      responses:
        '200':
          description: Available quotes. May be an empty list if no provider serves the route.
          content:
            application/json:
              schema:
                type: object
                properties:
                  origin_zone_id: { type: string }
                  destination_zone_id: { type: string }
                  quotes:
                    type: array
                    items: { $ref: '#/components/schemas/Quote' }
              example:
                origin_zone_id: ZONE_NBI_CBD_01
                destination_zone_id: ZONE_NKR_MAIN
                quotes:
                  - quote_id: qt_8f3b4d2a91c4e87ab11d42ef
                    provider_type: boda_rider
                    provider_name: Independent Rider (CBD Pool)
                    estimated_cost_kes: 250
                    estimated_time: "45 mins"
                    reliability_score: 0.85
                  - quote_id: qt_b1a56ce02d7345f398ee2c04
                    provider_type: matatu_sacco
                    provider_name: Mololine Sacco
                    estimated_cost_kes: 400
                    estimated_time: "3 hours"
                    reliability_score: 0.9
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          description: One or both zone IDs are unknown.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /v1/deliveries:
    post:
      tags: [Deliveries]
      summary: Lock in a chosen quote and create a delivery
      description: |
        Accepts a quote the customer selected, records delivery orchestration
        state, and generates a tracking ID. The shop owns customer/order/contact
        data and passes a shop-owned reference for provider handoff (ADR 0025).
      operationId: createDelivery
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/DeliveryRequest' }
            example:
              quote_id: qt_b1a56ce02d7345f398ee2c04
              shop_order_ref: ORDER-12345
              shop_handoff_url: https://shop.example.com/delivery-handoff/ORDER-12345
      responses:
        '201':
          description: Delivery created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Delivery' }
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          description: The quote_id is unknown or has expired.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /v1/deliveries/{tracking_id}/track:
    get:
      tags: [Deliveries]
      summary: Get the unified tracking status of a delivery
      description: |
        Returns the delivery's current universal status and its history.
        Every provider's own states are normalised into Itafika's five
        universal statuses.
      operationId: trackDelivery
      parameters:
        - name: tracking_id
          in: path
          required: true
          schema:
            type: string
            pattern: '^trk_[a-f0-9]{32}$'
      responses:
        '200':
          description: Current status and history.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TrackingResponse' }
              example:
                tracking_id: trk_7f93f6f7a86c4f5188ff8d5d9c6f2b47
                status: in_transit
                history:
                  - status: package_picked
                    at: "2026-06-08T08:14:00Z"
                  - status: in_transit
                    at: "2026-06-08T08:40:00Z"
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          description: Unknown tracking ID.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /v1/deliveries/{tracking_id}/events:
    post:
      tags: [Deliveries]
      summary: Append a tracking event to a delivery
      description: |
        Adds a new event to the delivery's unified tracking history.
        In Phase 1 this is a manual/internal update path used before full
        adapter-driven or webhook-driven tracking flows exist.
      operationId: createTrackingEvent
      parameters:
        - name: tracking_id
          in: path
          required: true
          schema:
            type: string
            pattern: '^trk_[a-f0-9]{32}$'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TrackingEventCreateRequest' }
            example:
              status: in_transit
              note: "Handed over to linehaul driver at Nairobi stage"
      responses:
        '201':
          description: Event recorded and tracking state updated.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TrackingResponse' }
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          description: Unknown tracking ID.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '409':
          description: Status regression is not allowed.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

components:
  schemas:

    ZoneType:
      type: string
      description: The kind of location.
      enum: [cbd_hub, stage, residential_area]

    ProviderType:
      type: string
      description: |
        A transport-mode identifier: the "mode" a customer chooses, and how adapters
        are grouped. This is an **open identifier drawn from the modes registry**
        (`GET /v1/modes`), **not a closed set** (ADR 0019). New modes are added as
        governed reference data (`modes.csv`), never by changing this contract or the
        engine. The core never branches on a specific value; consumers should render
        an unknown mode from the registry's display metadata rather than treating the
        examples below as exhaustive.

        The seed registry ships with all of these as data rows; `GET /v1/modes` returns
        the modes currently available through the API.
      examples: [boda_rider, matatu_sacco, bus, national_courier, shuttle, taxi, cargo_truck]

    Mode:
      type: object
      description: |
        A transport mode in the registry, with display metadata so a shop can render
        any mode, including ones added after it was built, without a code change
        (ADR 0019).
      properties:
        id: { $ref: '#/components/schemas/ProviderType' }
        label:
          type: string
          description: Display name shown to customers, e.g. "Shuttle".
        description:
          type: string
          description: One line on what the mode is.
      required: [id, label]

    CollectionType:
      type: string
      description: |
        How the customer gets the parcel for this option. Specified by ADR 0016
        (checkout-delivery direction).
      enum: [office_pickup, door_delivery]

    TrackingStatus:
      type: string
      description: The five universal delivery statuses.
      enum: [package_picked, in_transit, at_sorting_hub, ready_for_pickup, delivered]

    Coordinates:
      type: object
      properties:
        lat: { type: number, format: double }
        lng: { type: number, format: double }
      required: [lat, lng]

    Zone:
      type: object
      properties:
        id:
          type: string
          description: Stable, human-readable identifier, e.g. ZONE_NBI_CBD_01.
        name:
          type: string
          description: Human-readable name, e.g. "RNG Plaza".
        type: { $ref: '#/components/schemas/ZoneType' }
        town:
          type: string
          description: The town or city the zone belongs to.
        county:
          type: string
          description: |
            The county the zone belongs to, the top level of the checkout funnel
            (ADR 0017).
        coordinates: { $ref: '#/components/schemas/Coordinates' }
      required: [id, name, type, town]

    FreshnessEntry:
      type: object
      properties:
        town:
          type: string
          description: Town or city name matching the dataset freshness record.
        last_updated:
          type: string
          pattern: '^\d{4}-\d{2}-\d{2}$'
          description: Date when the dataset for this town was last reviewed.
      required: [town, last_updated]

    QuoteRequest:
      type: object
      properties:
        origin_zone_id: { type: string }
        destination_zone_id: { type: string }
        package_weight_kg:
          type: number
          format: double
          exclusiveMinimum: 0
          description: Package weight in kilograms.
        package_type:
          type: string
          description: Optional package category for filtering or ranking logic. Phase 1 implementations may ignore it.
      required: [origin_zone_id, destination_zone_id, package_weight_kg]

    Quote:
      type: object
      properties:
        quote_id:
          type: string
          description: Opaque ID used to book this quote via POST /v1/deliveries.
          pattern: '^qt_[a-f0-9]{24}$'
        provider_type: { $ref: '#/components/schemas/ProviderType' }
        provider_name:
          type: string
          description: Human-readable provider name shown to the customer.
        estimated_cost_kes:
          type: integer
          description: Estimated cost in Kenyan Shillings.
        estimated_time:
          type: string
          description: Human-readable estimate, e.g. "45 mins", "3 hours", "next day".
        reliability_score:
          type: number
          format: double
          minimum: 0
          maximum: 1
          description: |
            0 to 1 confidence in on-time, intact delivery. Asserted by the community or
            the provider's adapter, not yet measured from real deliveries. Omitted
            when there is no basis for a value (ADR 0021).
        collection_type:
          allOf: [{ $ref: '#/components/schemas/CollectionType' }]
          description: |
            How the customer gets this option's parcel: collect at the
            provider's office/stage, or door delivery. Specified by ADR 0016
            (checkout-delivery direction).
        collection_point:
          $ref: '#/components/schemas/CollectionPoint'
      required: [quote_id, provider_type, provider_name, estimated_cost_kes, estimated_time]

    CollectionPoint:
      type: object
      description: |
        For `office_pickup`, the zone where the customer collects the parcel. Absent
        for `door_delivery`. Specified by ADR 0016 (checkout-delivery direction).
      properties:
        zone_id: { type: string }
        name: { type: string }
        town: { type: string }
      required: [zone_id, name]

    DeliveryOption:
      type: object
      description: |
        A provider+mode the customer can choose for a destination town, with where it
        collects and an indicative starting cost. Navigation only: the exact bookable
        price comes from POST /v1/quotes. Specified by ADR 0017 (checkout-delivery
        direction). `provider_id` is deliberately not exposed (internal column).
      properties:
        provider_name: { type: string }
        provider_type: { $ref: '#/components/schemas/ProviderType' }
        reliability_score:
          type: number
          format: double
          minimum: 0
          maximum: 1
          description: |
            0 to 1 confidence; asserted, not measured. Omitted when there is no basis
            for a value (ADR 0021).
        collection_type: { $ref: '#/components/schemas/CollectionType' }
        collection_points:
          type: array
          description: The zones in the destination town where this provider collects.
          items: { $ref: '#/components/schemas/CollectionPoint' }
        from_cost_kes:
          type: integer
          description: Indicative starting cost (the route's base cost). Not bookable; get the exact price from POST /v1/quotes.
      required: [provider_name, provider_type, collection_type]

    DeliveryRequest:
      type: object
      properties:
        quote_id:
          type: string
          pattern: '^qt_[a-f0-9]{24}$'
        shop_order_ref:
          type: string
          minLength: 1
          maxLength: 120
          description: Shop-owned order or delivery reference used for orchestration.
        shop_handoff_url:
          type: string
          format: uri
          maxLength: 1000
          description: |
            Optional shop-owned provider handoff URL. The shop controls the
            customer/order details behind this URL (ADR 0025).
      required: [quote_id, shop_order_ref]

    Delivery:
      type: object
      properties:
        tracking_id:
          type: string
          description: Use with GET /v1/deliveries/{tracking_id}/track.
          pattern: '^trk_[a-f0-9]{32}$'
        status: { $ref: '#/components/schemas/TrackingStatus' }
        quote: { $ref: '#/components/schemas/Quote' }
        shop_order_ref:
          type: string
          description: Shop-owned order or delivery reference used for orchestration.
        shop_handoff_url:
          type: string
          format: uri
          description: Optional shop-owned provider handoff URL.
        created_at: { type: string, format: date-time }
      required: [tracking_id, status, quote, shop_order_ref, created_at]

    TrackingEvent:
      type: object
      properties:
        status: { $ref: '#/components/schemas/TrackingStatus' }
        at: { type: string, format: date-time }
        note: { type: string }
      required: [status, at]

    TrackingEventCreateRequest:
      type: object
      properties:
        status: { $ref: '#/components/schemas/TrackingStatus' }
        note:
          type: string
          minLength: 1
          maxLength: 500
      required: [status]

    TrackingResponse:
      type: object
      properties:
        tracking_id:
          type: string
          pattern: '^trk_[a-f0-9]{32}$'
        status: { $ref: '#/components/schemas/TrackingStatus' }
        history:
          type: array
          items: { $ref: '#/components/schemas/TrackingEvent' }
      required: [tracking_id, status, history]

    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code: { type: string }
            message: { type: string }
          required: [code, message]
      required: [error]

  responses:
    BadRequest:
      description: The request was malformed or failed validation.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          example:
            error:
              code: invalid_request
              message: "package_weight_kg must be a positive number"
